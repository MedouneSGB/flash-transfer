name: Build & Release Flash Transfer

on:
  push:
    tags:
      - 'v*'        # déclenche sur v1.0.0, v1.2.3, etc.
  workflow_dispatch: # permet de déclencher manuellement

permissions:
  contents: write   # nécessaire pour créer des releases GitHub

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macOS-Intel
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macOS-Apple-Silicon
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust ───────────────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Node ───────────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node deps
        run: npm install

      # ── Fix icons → force RGBA PNG (requis par Tauri) ──────────────────────
      - name: Convert icons to RGBA
        shell: bash
        run: |
          # --break-system-packages nécessaire sur macOS avec Homebrew Python
          python3 -m pip install --quiet Pillow --break-system-packages \
            || python3 -m pip install --quiet Pillow
          python3 - <<'PYEOF'
          import os
          from PIL import Image
          icons_dir = "src-tauri/icons"
          for fname in os.listdir(icons_dir):
              if fname.endswith(".png"):
                  p = os.path.join(icons_dir, fname)
                  img = Image.open(p).convert("RGBA")
                  img.save(p, "PNG")
                  print(f"  RGBA ok: {fname}")
          PYEOF

      # ── Linux system deps ──────────────────────────────────────────────────
      - name: Linux system libraries
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      # ── macOS : import du certificat de signature ──────────────────────────
      - name: Import Apple certificate
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing & notarization (ignorés sur Windows/Linux)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Flash⚡Transfer ${{ github.ref_name }}'
          releaseBody: |
            ## 📥 Téléchargements

            | Plateforme | Fichier |
            |---|---|
            | Windows | `.msi` ou `.exe` |
            | macOS Intel | `.dmg` (x86_64) |
            | macOS Apple Silicon | `.dmg` (aarch64) |
            | Linux | `.AppImage` ou `.deb` |

            ## ✨ Nouveautés
            - Voir les commits pour le détail des changements

          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      # ── macOS : nettoyage du keychain temporaire ───────────────────────────
      - name: Clean up keychain
        if: matrix.os == 'macos-latest' && always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" || true
